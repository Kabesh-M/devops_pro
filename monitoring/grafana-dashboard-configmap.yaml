apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-devops-webapp
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  grafana-dashboard-devops.json: |
    {
      "title": "DevOps Webapp Overview",
      "uid": "devops-webapp-overview",
      "tags": ["devops", "kubernetes"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Available Replicas",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {
              "expr": "sum(kube_deployment_status_replicas_available{deployment=\\"devops-webapp\\",namespace=\\"devops-prod\\"})",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Webapp CPU Usage",
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\\"devops-prod\\",pod=~\\"devops-webapp-.*\\"}[5m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        }
      ],
      "time": {"from": "now-30m", "to": "now"},
      "refresh": "30s"
    }
