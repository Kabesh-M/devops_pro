apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops-webapp-monitor
  namespace: monitoring
  labels:
    release: kube-prom-stack
spec:
  namespaceSelector:
    matchNames:
      - devops-prod
  selector:
    matchLabels:
      app: devops-webapp
  endpoints:
    - port: http
      interval: 15s
      path: /
